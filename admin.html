<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários — SAFE Comercial</title>
  <link rel="icon" href="assets/img/logo.png">
  <link rel="stylesheet" href="css/safe-theme.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="assets/img/logo.png" alt="SAFE">
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">SAFE</span>
        <span class="sidebar-brand-sub">Comercial</span>
      </div>
    </div>
    <div class="sidebar-toggle" id="sidebar-toggle">‹</div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">◈</span><span class="nav-label">Dashboard</span></a>
      <a href="vendas.html" class="nav-item"><span class="nav-icon">◎</span><span class="nav-label">Vendas</span></a>
      <hr class="nav-divider">
      <div class="nav-section-label">Administração</div>
      <a href="faturamento.html" class="nav-item"><span class="nav-icon">◉</span><span class="nav-label">Faturamento</span></a>
      <a href="concorrencia.html" class="nav-item"><span class="nav-icon">◐</span><span class="nav-label">Concorrência</span></a>
      <a href="admin.html" class="nav-item active"><span class="nav-icon">◑</span><span class="nav-label">Usuários</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="btn-logout">
        <div class="sidebar-avatar">T</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Thiago</div>
          <div class="sidebar-user-role">Administrador</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main" id="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <div>
          <div class="topbar-title">Usuários</div>
          <div class="topbar-subtitle">Gestão de acessos ao dashboard</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" id="btn-novo-usuario" data-write-only>+ Novo Usuário</button>
      </div>
    </div>

    <div class="page">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Consultores e Acessos</div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>PAC</th>
                <th>E-mail</th>
                <th>Perfil</th>
                <th>Status</th>
                <th style="width:100px"></th>
              </tr>
            </thead>
            <tbody id="tabela-usuarios">
              <tr><td colspan="6" class="text-center text-muted" style="padding:40px">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Card: alterar senha -->
      <div class="card mt-24">
        <div class="card-header">
          <div class="card-title">Alterar minha senha</div>
        </div>
        <div style="max-width:400px">
          <div class="form-group">
            <label class="form-label">Senha atual</label>
            <input type="password" class="form-control" id="senha-atual" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label class="form-label">Nova senha</label>
            <input type="password" class="form-control" id="senha-nova" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar nova senha</label>
            <input type="password" class="form-control" id="senha-confirmar" placeholder="••••••••">
          </div>
          <button class="btn btn-navy" id="btn-alterar-senha">Alterar Senha</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Usuário -->
<div class="modal-overlay" id="modal-usuario">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-u-titulo">Novo Usuário</h3>
      <button class="modal-close" onclick="fecharModal('modal-usuario')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nome Completo</label>
        <input type="text" class="form-control" id="u-nome" placeholder="Nome do consultor">
      </div>
      <div class="form-group">
        <label class="form-label">PAC (identificador de login)</label>
        <input type="text" class="form-control" id="u-pac" placeholder="Ex: Joao">
      </div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-control" id="u-email" placeholder="email@voesafe.com.br">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Perfil</label>
          <select class="form-control" id="u-perfil">
            <option value="pac">Consultor (PAC)</option>
            <option value="admin">Administrador completo</option>
            <option value="admin_readonly">Administrador somente visualização</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-control" id="u-ativo">
            <option value="true">Ativo</option>
            <option value="false">Inativo</option>
          </select>
        </div>
      </div>
      <div class="form-group" id="grupo-senha">
        <label class="form-label">Senha inicial</label>
        <input type="password" class="form-control" id="u-senha" placeholder="Deixe vazio para usar: safe@2024">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fecharModal('modal-usuario')">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-usuario">Salvar</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
