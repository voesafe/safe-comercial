<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendas — SAFE Comercial</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#19213f">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/safe-theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    /* ── Fade-in de página ─────────────────────────────────── */
    .page { animation: pageFadeIn .35s ease both; }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Skeleton tabela ───────────────────────────────────── */
    .sk-row td div {
      height: 14px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Seções do modal ───────────────────────────────────── */
    .modal-section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-title);
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--gray-400);
      margin: 4px 0 16px;
    }
    .modal-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-100);
    }
    .modal-section-title svg { color: var(--blue); flex-shrink: 0; }

    /* ── Tooltip sidebar collapsed ─────────────────────────── */
    .nav-item { position: relative; }
    .sidebar.collapsed .nav-item::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(100% + 14px);
      top: 50%; transform: translateY(-50%);
      background: var(--navy-deep);
      color: var(--white);
      font-size: .78rem; font-weight: 600;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0; transition: opacity .15s;
      z-index: 300;
      box-shadow: var(--shadow-md);
    }
    .sidebar.collapsed .nav-item::before {
      content: '';
      position: absolute;
      left: calc(100% + 8px); top: 50%; transform: translateY(-50%);
      border: 5px solid transparent;
      border-right-color: var(--navy-deep);
      pointer-events: none;
      opacity: 0; transition: opacity .15s; z-index: 300;
    }
    .sidebar.collapsed .nav-item:hover::after,
    .sidebar.collapsed .nav-item:hover::before { opacity: 1; }
  </style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="assets/img/logo.png" alt="SAFE">
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">SAFE</span>
        <span class="sidebar-brand-sub">Comercial</span>
      </div>
    </div>
    <div class="sidebar-toggle" id="sidebar-toggle">‹</div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a href="dashboard.html" class="nav-item" data-tooltip="Dashboard">
        <span class="nav-icon"></span><span class="nav-label">Dashboard</span>
      </a>
      <a href="vendas.html" class="nav-item active" data-tooltip="Vendas">
        <span class="nav-icon"></span><span class="nav-label">Vendas</span>
      </a>
      <hr class="nav-divider" data-admin-only>
      <div class="nav-section-label" data-admin-only>Administração</div>
      <a href="faturamento.html" class="nav-item" data-admin-only data-tooltip="Faturamento">
        <span class="nav-icon"></span><span class="nav-label">Faturamento</span>
      </a>
      <a href="concorrencia.html" class="nav-item" data-admin-only data-tooltip="Concorrência">
        <span class="nav-icon"></span><span class="nav-label">Concorrência</span>
      </a>
      <a href="admin.html" class="nav-item" data-admin-only data-tooltip="Usuários">
        <span class="nav-icon"></span><span class="nav-label">Usuários</span>
      </a>

      <hr class="nav-divider" data-master-only>
      <div class="nav-section-label" data-master-only>TI</div>
      <a href="https://docs.google.com/spreadsheets/d/1LZ2z3yLZvIdw2h0FohhwoiYLEGwy9zz7CYL40_j2AVw/edit?gid=1905416248#gid=1905416248" target="_blank" class="nav-item" data-master-only data-tooltip="Planilha">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg></span>
        <span class="nav-label">Planilha</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user-current">
        <div class="sidebar-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Carregando...</div>
          <div class="sidebar-user-role">—</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main" id="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <div>
          <div class="topbar-title">Vendas</div>
          <div class="topbar-subtitle" id="info-total">Carregando...</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-period">
          <select id="sel-mes">
            <option value="">Todos os meses</option>
            <option value="1">Janeiro</option><option value="2">Fevereiro</option>
            <option value="3">Março</option><option value="4">Abril</option>
            <option value="5">Maio</option><option value="6">Junho</option>
            <option value="7">Julho</option><option value="8">Agosto</option>
            <option value="9">Setembro</option><option value="10">Outubro</option>
            <option value="11">Novembro</option><option value="12">Dezembro</option>
          </select>
          <select id="sel-ano">
            <option value="2025">2025</option>
            <option value="2026" selected>2026</option>
          </select>
        </div>
        <button class="btn btn-primary" id="btn-nova-venda" data-write-only>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nova Venda
        </button>
        <button class="btn btn-ghost" id="btn-exportar-vendas" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          Exportar CSV
        </button>
      </div>
    </div>

    <div class="page">
      <div class="card">
        <div class="card-header vendas-card-header">
          <div class="vendas-header-row">
            <div class="card-title">Registro de Vendas</div>
            <span id="badge-filtros-ativos" class="vendas-filter-count">0 filtros</span>
          </div>
          <div class="vendas-filter-panel" aria-label="Filtros de vendas">
            <div class="vendas-filter-field vendas-filter-search">
              <label for="busca">Busca</label>
              <input type="text" id="busca" class="form-control" placeholder="Nome, curso, email ou PAC">
            </div>
            <div class="vendas-filter-field" data-admin-only>
              <label for="filtro-pac-vendas">PAC</label>
              <select id="filtro-pac-vendas" class="form-control vendas-pac-filter">
                <option value="">Todos os PACs</option>
              </select>
            </div>
            <div class="vendas-filter-field">
              <label for="filtro-cidade-vendas">Cidade</label>
              <select id="filtro-cidade-vendas" class="form-control">
                <option value="">Todas as cidades</option>
              </select>
            </div>
            <div class="vendas-filter-field">
              <label for="filtro-estado-vendas">Estado</label>
              <select id="filtro-estado-vendas" class="form-control">
                <option value="">Todos os estados</option>
              </select>
            </div>
            <div class="vendas-filter-field">
              <label for="filtro-idade-vendas">Faixa etária</label>
              <select id="filtro-idade-vendas" class="form-control">
                <option value="">Todas as idades</option>
                <option value="menor18">Menor de 18</option>
                <option value="18-24">18 - 24 anos</option>
                <option value="25-34">25 - 34 anos</option>
                <option value="35-44">35 - 44 anos</option>
                <option value="45-54">45 - 54 anos</option>
                <option value="55+">55+ anos</option>
              </select>
            </div>
            <button class="btn btn-ghost btn-sm vendas-clear-filters" id="btn-limpar-filtros" type="button">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              Limpar
            </button>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table table-vendas">
            <thead>
              <tr>
                <th>Data</th>
                <th id="col-pac-header" class="col-pac">PAC</th>
                <th>Cliente</th>
                <th class="col-curso">Curso</th>
                <th class="col-origem">Origem</th>
                <th class="col-lead">Lead Novo</th>
                <th class="col-valor" style="text-align:right">Valor</th>
                <th style="width:48px"></th>
              </tr>
            </thead>
            <tbody id="tabela-vendas"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ── Modal Venda ────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-venda">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h3 id="modal-titulo" style="font-size:1.05rem">Nova Venda</h3>
      <button class="modal-close" id="modal-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">

      <!-- Seção: Dados da Venda -->
      <div class="modal-section-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 3v18l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V3l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
        Dados da Venda
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Data da Venda *</label>
          <input type="date" class="form-control" id="f-data">
        </div>
        <div class="form-group">
          <label class="form-label">Consultor (PAC)</label>
          <select class="form-control" id="f-pac">
            <option value="Thiago">Thiago</option>
            <option value="Marlon">Marlon</option>
            <option value="Adauto">Adauto</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Curso / Produto Comprado *</label>
        <select class="form-control" id="f-curso">
          <option value="">Selecione o curso</option>
          <option>Piloto Privado Teórico</option>
          <option>Piloto Privado Prático</option>
          <option>Piloto Comercial/IFR Prático</option>
          <option>Piloto Comercial Teórico</option>
          <option>Piloto Comercial/IFR MLTE</option>
          <option>INVA Teórico</option>
          <option>INVA Prático</option>
          <option>Aperfeiçoamento Contínuo</option>
          <option>Adaptação de Instrutor Externo</option>
          <option>SAFE Pilot Academy</option>
          <option>Alojamento</option>
          <option>Voo de Incentivo</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor da Compra (R$) *</label>
          <input type="text" inputmode="numeric" class="form-control" id="f-valor" placeholder="0,00">
        </div>
        <div class="form-group">
          <label class="form-label">Origem do Lead</label>
          <select class="form-control" id="f-origem">
            <option value="">Selecione</option>
            <option>Instagram</option><option>Google</option><option>Site</option>
            <option>Facebook</option><option>Indicação</option>
            <option>Aluno Interno</option><option>YouTube</option>
            <option>WhatsApp</option><option>Outros</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Lead Novo?</label>
          <select class="form-control" id="f-lead-novo">
            <option value="Não">Não</option>
            <option value="Sim">Sim</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Quem Comprou</label>
          <select class="form-control" id="f-quem-comprou">
            <option value="">—</option>
            <option value="Aluno">Aluno</option>
            <option value="Pai">Pai</option>
            <option value="Mãe">Mãe</option>
            <option value="Pai e Mãe">Pai e Mãe</option>
            <option value="Responsável">Responsável</option>
          </select>
        </div>
      </div>

      <!-- Seção: Dados do Cliente -->
      <div class="modal-section-title" style="margin-top:8px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Dados do Cliente
      </div>

      <div class="form-group">
        <label class="form-label">Nome Completo *</label>
        <input type="text" class="form-control" id="f-nome" placeholder="Nome completo do cliente">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Sexo</label>
          <select class="form-control" id="f-sexo">
            <option value="">—</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Data de Nascimento</label>
          <input type="date" class="form-control" id="f-nascimento">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-control" id="f-email" placeholder="email@exemplo.com">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cidade</label>
          <input type="text" class="form-control" id="f-cidade" placeholder="Cidade">
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-control" id="f-estado">
            <option value="">—</option>
            <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
            <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
            <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
            <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
            <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
            <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
            <option>SP</option><option>SE</option><option>TO</option>
          </select>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cancelar">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar">Salvar Venda</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/vendas.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      if (!Auth.eAdmin()) document.getElementById('col-pac-header')?.remove();
    }, 100);
  });
</script>
</body>
</html>
