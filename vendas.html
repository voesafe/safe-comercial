<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendas — SAFE Comercial</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="assets/img/logo.png">
  <link rel="stylesheet" href="css/safe-theme.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="assets/img/logo.png" alt="SAFE">
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">SAFE</span>
        <span class="sidebar-brand-sub">Comercial</span>
      </div>
    </div>
    <div class="sidebar-toggle" id="sidebar-toggle">‹</div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">◈</span><span class="nav-label">Dashboard</span>
      </a>
      <a href="vendas.html" class="nav-item active">
        <span class="nav-icon">◎</span><span class="nav-label">Vendas</span>
      </a>
      <hr class="nav-divider" data-admin-only>
      <div class="nav-section-label" data-admin-only>Administração</div>
      <a href="faturamento.html" class="nav-item" data-admin-only>
        <span class="nav-icon">◉</span><span class="nav-label">Faturamento</span>
      </a>
      <a href="concorrencia.html" class="nav-item" data-admin-only>
        <span class="nav-icon">◐</span><span class="nav-label">Concorrência</span>
      </a>
      <a href="admin.html" class="nav-item" data-admin-only>
        <span class="nav-icon">◑</span><span class="nav-label">Usuários</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="btn-logout">
        <div class="sidebar-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Carregando...</div>
          <div class="sidebar-user-role">—</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main" id="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <div>
          <div class="topbar-title">Vendas</div>
          <div class="topbar-subtitle" id="info-total">Carregando...</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-period">
          <select id="sel-mes">
            <option value="">Todos os meses</option>
            <option value="1">Janeiro</option><option value="2">Fevereiro</option>
            <option value="3">Março</option><option value="4">Abril</option>
            <option value="5">Maio</option><option value="6">Junho</option>
            <option value="7">Julho</option><option value="8">Agosto</option>
            <option value="9">Setembro</option><option value="10">Outubro</option>
            <option value="11">Novembro</option><option value="12">Dezembro</option>
          </select>
          <select id="sel-ano">
            <option value="2025">2025</option>
            <option value="2026" selected>2026</option>
          </select>
        </div>
        <button class="btn btn-primary" id="btn-nova-venda" data-write-only>+ Nova Venda</button>
      </div>
    </div>

    <div class="page">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Registro de Vendas</div>
          <div class="card-actions">
            <select id="filtro-pac-vendas" class="form-control vendas-pac-filter" data-admin-only>
              <option value="">Todos os PACs</option>
            </select>
            <input type="text" id="busca" class="form-control"
              placeholder="Buscar por nome, curso, email..."
              style="max-width:280px">
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table table-vendas">
            <thead>
              <tr>
                <th>Data</th>
                <th id="col-pac-header" class="col-pac">PAC</th>
                <th>Cliente</th>
                <th class="col-curso">Curso</th>
                <th class="col-origem">Origem</th>
                <th class="col-lead">Lead Novo</th>
                <th class="col-valor" style="text-align:right">Valor</th>
                <th style="width:48px"></th>
              </tr>
            </thead>
            <tbody id="tabela-vendas">
              <tr><td colspan="8" class="text-center text-muted" style="padding:40px">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Venda -->
<div class="modal-overlay" id="modal-venda">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-titulo">Nova Venda</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Data da Venda *</label>
          <input type="date" class="form-control" id="f-data">
        </div>
        <div class="form-group">
          <label class="form-label">PAC (Consultor)</label>
          <select class="form-control" id="f-pac">
            <option value="Thiago">Thiago</option>
            <option value="Marlon">Marlon</option>
            <option value="Adauto">Adauto</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Nome Completo do Cliente *</label>
        <input type="text" class="form-control" id="f-nome" placeholder="Nome completo">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Sexo</label>
          <select class="form-control" id="f-sexo">
            <option value="">—</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Data de Nascimento</label>
          <input type="date" class="form-control" id="f-nascimento">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cidade</label>
          <input type="text" class="form-control" id="f-cidade" placeholder="Cidade">
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-control" id="f-estado">
            <option value="">—</option>
            <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
            <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
            <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
            <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
            <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
            <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
            <option>SP</option><option>SE</option><option>TO</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Origem do Lead</label>
        <select class="form-control" id="f-origem">
          <option value="">Selecione</option>
          <option>Instagram</option><option>Google</option><option>Site</option>
          <option>Facebook</option><option>Indicação</option>
          <option>Aluno Interno</option><option>YouTube</option>
          <option>WhatsApp</option><option>Outros</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Curso / Produto Comprado *</label>
        <select class="form-control" id="f-curso">
          <option value="">Selecione o curso</option>
          <option>Piloto Privado Teórico</option>
          <option>Piloto Privado Prático</option>
          <option>Piloto Comercial/IFR Prático</option>
          <option>Piloto Comercial Teórico</option>
          <option>Piloto Comercial/IFR MLTE</option>
          <option>INVA Teórico</option>
          <option>INVA Prático</option>
          <option>Aperfeiçoamento Contínuo</option>
          <option>Adaptação de Instrutor Externo</option>
          <option>SAFE Pilot Academy</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">E-mail do Cliente</label>
        <input type="email" class="form-control" id="f-email" placeholder="email@exemplo.com">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor da Compra (R$) *</label>
          <input type="number" class="form-control" id="f-valor" placeholder="0,00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Lead Novo?</label>
          <select class="form-control" id="f-lead-novo">
            <option value="Não">Não</option>
            <option value="Sim">Sim</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Quem Comprou (se menor de idade)</label>
        <select class="form-control" id="f-quem-comprou">
          <option value="">—</option>
          <option value="Aluno">Aluno</option>
          <option value="Pai">Pai</option>
          <option value="Mãe">Mãe</option>
          <option value="Pai e Mãe">Pai e Mãe</option>
          <option value="Responsável">Responsável</option>
        </select>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cancelar">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar">Salvar Venda</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/vendas.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      if (!Auth.eAdmin()) {
        document.getElementById('col-pac-header')?.remove();
      }
    }, 100);
  });
</script>
</body>
</html>
